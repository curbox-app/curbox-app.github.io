<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Mobile-first viewport.
      `viewport-fit=cover` lets the canvas bleed into the notch/safe areas on
      modern OLED phones, and `user-scalable=no` stops the browser pinch-zoom
      from fighting our own WebGL camera zoom.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Infinity · Reels</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- The single WebGL canvas is injected here by Pixi. Zero DOM imagery. -->
    <div id="app"></div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
